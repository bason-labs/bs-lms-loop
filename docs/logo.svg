<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" role="img" aria-label="BS">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#008b8b"/>
      <stop offset="60%" stop-color="#006d6f"/>
      <stop offset="100%" stop-color="#0d98ba"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#40e0d0" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect x="8" y="8" width="104" height="104" rx="28" fill="url(#brand)" filter="url(#glow)"/>
  <rect x="8.75" y="8.75" width="102.5" height="102.5" rx="27.25" fill="none" stroke="#7df9ff" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="60" y="62" text-anchor="middle" dominant-baseline="central"
        font-family="'Space Grotesk', ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-size="54" font-weight="700" letter-spacing="-1.6" fill="#eafeff">BS</text>
