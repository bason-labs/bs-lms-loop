<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <header class="topbar reveal" style="--d:0">
    <div class="brand">
      <span class="mark" aria-hidden="true">BS</span>
      <span class="wordmark">LMS&nbsp;Loop</span>
    </div>
    <div id="chip" class="chip" data-status="idle">
      <span class="chip-dot"></span>
      <span id="chip-label">idle</span>
    </div>
  </header>

  <section class="hero reveal" style="--d:1">
    <p class="hero-eyebrow">Autopilot</p>
    <h1 id="hero-status" class="hero-status">Standing by</h1>
    <p id="hero-sub" class="hero-sub">Open a lesson and start the loop.</p>

    <button id="power" class="power" type="button">
      <span class="power-glyph" aria-hidden="true"></span>
      <span id="power-label" class="power-label">Start automating</span>
    </button>

    <div class="seg" data-group="mode" role="group" aria-label="Run mode">
      <button type="button" class="seg-btn" data-value="auto">Auto&nbsp;loop</button>
      <button type="button" class="seg-btn" data-value="step">Step</button>
    </div>
  </section>

  <section class="card reveal" style="--d:2">
    <div class="card-head">
      <h2 class="label">Intelligence</h2>
      <span class="label-note">used for quizzes</span>
    </div>

    <div class="pills" data-group="provider" role="group" aria-label="LLM provider">
      <button type="button" class="pill" data-value="openai">OpenAI</button>
      <button type="button" class="pill" data-value="anthropic">Anthropic</button>
      <button type="button" class="pill" data-value="gemini">Gemini</button>
      <button type="button" class="pill" data-value="custom">Custom</button>
    </div>

    <div class="field">
      <label class="field-label" for="apiKey">API key</label>
      <div class="key-row">
        <input id="apiKey" class="input mono" type="password" autocomplete="off"
               spellcheck="false" placeholder="blank → skip / guess quizzes">
        <button id="reveal" class="icon-btn" type="button" title="Show / hide" aria-label="Show or hide key">
          <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M12 5c5 0 8.5 4.2 9.5 6.6.2.5.2 1 0 1.5C20.5 15.8 17 20 12 20s-8.5-4.2-9.5-6.9a1.8 1.8 0 0 1 0-1.5C3.5 9.2 7 5 12 5Zm0 2.2c-3.6 0-6.5 3-7.4 4.9.9 1.9 3.8 4.9 7.4 4.9s6.5-3 7.4-4.9C18.5 10.2 15.6 7.2 12 7.2Zm0 1.9a3 3 0 1 1 0 6 3 3 0 0 1 0-6Z"/></svg>
        </button>
      </div>
      <div class="key-actions">
        <button id="test" class="ghost" type="button">Test key</button>
        <span id="test-result" class="test-result"></span>
      </div>
    </div>

    <div class="field">
      <label class="field-label" for="model">Model</label>
      <input id="model" class="input" type="text" spellcheck="false" placeholder="gpt-4o-mini">
    </div>

    <div class="field" id="baseUrl-field" hidden>
      <label class="field-label" for="baseUrl">Base URL</label>
      <input id="baseUrl" class="input mono" type="text" spellcheck="false" placeholder="https://your-endpoint">
    </div>
  </section>

  <section class="card reveal" style="--d:3">
    <button id="adv-toggle" class="card-head as-button" type="button" aria-expanded="false" aria-controls="adv-body">
      <h2 class="label">Behavior</h2>
      <span class="chev" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="m6 9 6 6 6-6"/></svg>
      </span>
    </button>

    <div id="adv-body" class="adv-body" hidden>
      <div class="field">
        <div class="field-label-row">
          <label class="field-label" for="playbackRate">Video speed</label>
          <span id="rate-value" class="rate-value">×8</span>
        </div>
        <input id="playbackRate" class="range" type="range" min="1" max="16" step="1" value="8">
      </div>

      <div class="field">
        <label class="field-label">No-key quiz fallback</label>
        <div class="seg" data-group="fallback" role="group" aria-label="Fallback when no key">
          <button type="button" class="seg-btn" data-value="random">Random&nbsp;fill</button>
          <button type="button" class="seg-btn" data-value="skip">Skip</button>
        </div>
      </div>
    </div>
  </section>

  <footer class="foot reveal" style="--d:4">
    <span id="foot-msg">Runs on the active tab · state survives reloads</span>
  </footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
